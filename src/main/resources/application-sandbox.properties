# ==============================================================================
# CONSUMA — Perfil SANDBOX (operacional controlada)
# ==============================================================================
# Objetivo: ambiente repetível, seguro (secrets obrigatórios), Flyway ativo e
# mocks controlados (AppyPay/SMS) para operação mínima antes da UI.

spring.config.activate.on-profile=sandbox

# ------------------------------------------------------------------------------
# Datasource (PostgreSQL)
# ------------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres-sandbox}:${DB_PORT:5432}/${DB_NAME:restaurante_sandbox_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# ------------------------------------------------------------------------------
# Flyway (sempre ativo; clean bloqueado)
# ------------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# ------------------------------------------------------------------------------
# Actuator / Observabilidade mínima
# ------------------------------------------------------------------------------
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS:health,info}
management.endpoint.health.show-details=never

# ------------------------------------------------------------------------------
# URLs e CORS
# ------------------------------------------------------------------------------
app.base-url=${APP_BASE_URL:http://localhost:8080/api}
app.client-url=${CLIENT_APP_URL:http://localhost:3000}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# ------------------------------------------------------------------------------
# Security / Secrets (obrigatórios em sandbox)
# ------------------------------------------------------------------------------
jwt.secret=${JWT_SECRET}
consuma.device.token-hash-secret=${DEVICE_TOKEN_HASH_SECRET}
consuma.sync.cursor.hmac-secret=${SYNC_CURSOR_HMAC_SECRET}

consuma.financeiro.snapshot-integridade.keys.platform-snapshot-key-v1.secret=${CONSUMA_SNAPSHOT_HMAC_SECRET_V1}
consuma.financeiro.snapshot-integridade.signature-secret=${CONSUMA_SNAPSHOT_HMAC_SECRET_V1}
consuma.financeiro.snapshot-integridade.signature-key-id=${SNAPSHOT_SIGNATURE_KEY_ID:platform-snapshot-key-v1}
consuma.financeiro.snapshot-integridade.active-key-id=${SNAPSHOT_SIGNATURE_ACTIVE_KEY_ID:platform-snapshot-key-v1}
consuma.evidence.tx-ledger.enabled=${CONSUMA_TX_EVIDENCE_ENABLED:true}
consuma.evidence.tx-ledger.key-version=${CONSUMA_TX_EVIDENCE_KEY_VERSION:1}
consuma.evidence.tx-ledger.dev-hmac-secret=${CONSUMA_TX_EVIDENCE_HMAC_KEY_V1}

# ------------------------------------------------------------------------------
# AppyPay (sandbox inicial: mock + HMAC required)
# ------------------------------------------------------------------------------
app.payment.appypay.mock=${APP_PAYMENT_APPYPAY_MOCK:true}
app.payment.appypay.webhook-secret=${APPYPAY_WEBHOOK_SECRET}
app.payment.appypay.webhook-signature-required=${APPYPAY_WEBHOOK_SIGNATURE_REQUIRED:true}
app.payment.appypay.callback-url=${APPYPAY_CALLBACK_URL:${app.base-url}/pagamentos/callback}
app.payment.appypay.return-url=${APPYPAY_RETURN_URL:${app.base-url}/pagamentos/callback}
app.payment.appypay.debug=${APPYPAY_DEBUG:false}

# ------------------------------------------------------------------------------
# SMS/OTP (sandbox inicial sem envio real)
# ------------------------------------------------------------------------------
consuma.sms.provider=${CONSUMA_SMS_PROVIDER:sandbox}
consuma.sms.enabled=${CONSUMA_SMS_ENABLED:false}
consuma.otp.mock-enabled=${CONSUMA_OTP_MOCK_ENABLED:true}

# ------------------------------------------------------------------------------
# Scheduler (controlável por env var)
# ------------------------------------------------------------------------------
spring.task.scheduling.enabled=${SPRING_TASK_SCHEDULING_ENABLED:true}

# ------------------------------------------------------------------------------
# Demo seed (desligado por padrão; activar somente em sandbox controlada)
# ------------------------------------------------------------------------------
consuma.sandbox.demo-seed.enabled=${CONSUMA_SEED_DEMO:false}

# ------------------------------------------------------------------------------
# Logging (reduzir verbosidade herdada do application.properties)
# ------------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.restaurante=INFO
logging.level.com.restaurante.financeiro=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
