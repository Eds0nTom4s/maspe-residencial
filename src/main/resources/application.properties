# Configuração do servidor
server.port=8080
server.servlet.context-path=/api

# Profile ativo
spring.profiles.active=dev

# ===============================================================================
# DATASOURCE (PostgreSQL por padrão)
# ===============================================================================
# Prompt 0.2: baseline real PostgreSQL + Flyway passa a ser fonte de verdade do schema.
spring.datasource.url=jdbc:postgresql://localhost:5432/restaurante_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.h2.console.enabled=false

# Configuração do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# ===============================================================================
# FLYWAY (MIGRAÇÕES)
# ===============================================================================
# Prompt 0.2: baseline real V1 (schema atual completo).
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
# Segurança: desabilita clean por padrão (evita DROP acidental)
spring.flyway.clean-disabled=true

# Se precisar de H2 para desenvolvimento rápido, use um profile dedicado (ex.: `dev-h2`)
# que desabilite Flyway e habilite ddl-auto=create-drop (não recomendado para piloto).

# Configuração de logging
logging.level.root=INFO
logging.level.com.restaurante=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configuração de JSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# Configuração de validação
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Configuração do OpenAPI/Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.use-root-path=false

# Configuração de CORS (ajustar para produção)
cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:4200,http://localhost:5173,http://localhost:5174
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Configuração para OTP (a implementar)
otp.mock=true
otp.expiration-minutes=5
otp.length=4

# Configuração para WebSocket (preparado)
websocket.endpoint=/ws
websocket.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:4200

# Configuração JWT Security
# ⚠️ SEGURANÇA: Em produção, definir JWT_SECRET como variável de ambiente
# Exemplo: export JWT_SECRET=seu-secret-super-seguro-minimo-256-bits
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================================================================
# DISPOSITIVOS OPERACIONAIS (POS/KDS)
# ===============================================================================
consuma.device.activation-code-expiration-minutes=${DEVICE_ACTIVATION_CODE_EXP_MINUTES:30}
consuma.device.token-hash-secret=${DEVICE_TOKEN_HASH_SECRET:dev-secret-change-me}
consuma.device.heartbeat-stale-minutes=${DEVICE_HEARTBEAT_STALE_MINUTES:5}

# ===============================================================================
# HARDENING (Prompt 21)
# ===============================================================================
# Requer que tokens TENANT carreguem tenantAccessVersion; se mismatch, retorna 401 TENANT_TOKEN_STALE
consuma.security.tenant-token.require-access-version=${TENANT_TOKEN_REQUIRE_ACCESS_VERSION:true}

# OperationalEventLog: proteção contra consultas pesadas
consuma.operational-events.default-lookback-days=${OP_EVENTS_DEFAULT_LOOKBACK_DAYS:30}
consuma.operational-events.max-page-size=${OP_EVENTS_MAX_PAGE_SIZE:100}
consuma.operational-events.retention-days=${OP_EVENTS_RETENTION_DAYS:180}
consuma.operational-events.cleanup-enabled=${OP_EVENTS_CLEANUP_ENABLED:false}

# ===============================================================================
# PRODUÇÃO / KDS-READY (Prompt 22)
# ===============================================================================
consuma.producao.default-lookback-hours=${PRODUCAO_DEFAULT_LOOKBACK_HOURS:12}
consuma.producao.max-page-size=${PRODUCAO_MAX_PAGE_SIZE:100}
consuma.producao.default-page-size=${PRODUCAO_DEFAULT_PAGE_SIZE:25}
consuma.producao.atrasado-threshold-minutes=${PRODUCAO_ATRASADO_THRESHOLD_MINUTES:30}

# ===============================================================================
# OBSERVABILIDADE OPERACIONAL (Prompt 35) — PLATFORM
# ===============================================================================
consuma.observabilidade.device-offline-threshold-minutes=${OBS_DEVICE_OFFLINE_THRESHOLD_MINUTES:5}
consuma.observabilidade.producao-subpedido-atrasado-minutes=${OBS_PRODUCAO_ATRASADO_MINUTES:30}
consuma.observabilidade.turno-em-fecho-longo-minutes=${OBS_TURNO_EM_FECHO_LONGO_MINUTES:30}
consuma.observabilidade.eventos-default-lookback-hours=${OBS_EVENTOS_DEFAULT_LOOKBACK_HOURS:24}
consuma.observabilidade.max-page-size=${OBS_MAX_PAGE_SIZE:100}

# Configuração da aplicação
app.base-url=http://localhost:8080/api
app.client-url=${CLIENT_APP_URL:http://localhost:3000}

# Controle operacional de ocupação das mesas
# SPRINT 1: sessao.expiracao.horas agora representa horas de INATIVIDADE REAL
# (medidas desde ultimaAtividadeEm, não desde abertaEm).
# Uma sessão só expira se não houver pedido, pagamento ou movimentação de fundo
# dentro desta janela temporal. Ver: SessaoExpiracaoScheduler, expirarComSeguranca().
sessao.expiracao.horas=${SESSAO_EXPIRACAO_HORAS:12}

# ===============================================================================
# OPERAÇÃO (Turnos / disciplina) — Prompt 36
# ===============================================================================
consuma.operacao.require-open-turno-for-manual-payments=${REQUIRE_OPEN_TURNO_FOR_MANUAL_PAYMENTS:true}

# Prompt 37: Relatório de caixa por turno (operacional)
consuma.financeiro.caixa-turno.eventos-recentes-limit=${CAIXA_TURNO_EVENTOS_LIMIT:20}
consuma.financeiro.caixa-turno.incluir-eventos=${CAIXA_TURNO_INCLUIR_EVENTOS:true}
consuma.financeiro.caixa-turno.incluir-pendentes=${CAIXA_TURNO_INCLUIR_PENDENTES:true}

# Prompt 37.2 — Integridade do snapshot financeiro (hash canônico) + export lógico
consuma.financeiro.snapshot-integridade.enabled=${SNAPSHOT_INTEGRIDADE_ENABLED:true}
consuma.financeiro.snapshot-integridade.algorithm=${SNAPSHOT_INTEGRIDADE_ALGO:SHA-256}
consuma.financeiro.snapshot-integridade.canonicalization-version=${SNAPSHOT_INTEGRIDADE_CANON_VER:1.0}
consuma.financeiro.snapshot-integridade.audit-export=${SNAPSHOT_INTEGRIDADE_AUDIT_EXPORT:true}
consuma.financeiro.snapshot-integridade.signature-enabled=${SNAPSHOT_SIGNATURE_ENABLED:true}
consuma.financeiro.snapshot-integridade.signature-algorithm=${SNAPSHOT_SIGNATURE_ALGO:HMAC-SHA256}
consuma.financeiro.snapshot-integridade.signature-key-id=${SNAPSHOT_SIGNATURE_KEY_ID:platform-snapshot-key-v1}
consuma.financeiro.snapshot-integridade.signature-secret=${CONSUMA_SNAPSHOT_HMAC_SECRET:}
# Limiar recomendado para alerta visual no painel administrativo.
sessao.alerta.ocupacao.horas=${SESSAO_ALERTA_OCUPACAO_HORAS:3}


# ===============================================================================
# CONFIGURAÇÕES FINANCEIRAS (BOOTSTRAP)
# ===============================================================================
# ATENÇÃO: Estes valores são usados APENAS na PRIMEIRA EXECUÇÃO
# Após inicialização, o BANCO DE DADOS é a fonte de verdade
# Para alterar valores, use o frontend administrativo

# Limite máximo de pós-pago aberto por unidade de consumo (em AOA)
financeiro.limite-pos-pago=50000.00

# Valor mínimo para operações financeiras (em AOA)
# Aplica-se a: recarga de fundo, débito, estorno
financeiro.valor-minimo-operacao=10.00

# ===============================================================================
# APPYPAY - GATEWAY DE PAGAMENTO
# ===============================================================================
# BASEADO EM ARENATICKET (VALIDADO EM PRODUÇÃO)
# 
# IMPORTANTE: Use perfil DEV para testes reais
# mvn spring-boot:run -Dspring-boot.run.profiles=dev

# URLs da API AppyPay (placeholder - sobrescrito no perfil dev)
app.payment.appypay.base-url=https://gwy-api.appypay.co.ao/v2.0/
app.payment.appypay.token-url=https://login.microsoftonline.com/auth.appypay.co.ao/oauth2/token

# Credenciais OAuth2 (placeholder - usar ENV ou perfil dev)
app.payment.appypay.client-id=seu_client_id_aqui
app.payment.appypay.client-secret=${APPYPAY_CLIENT_SECRET:}
app.payment.appypay.resource=${APPYPAY_RESOURCE:bee57785-7a19-4f1c-9c8d-aa03f2f0e333}

# Callback
app.payment.appypay.callback-url=${app.base-url}/pagamentos/callback

# Segredo partilhado para validação HMAC-SHA256 de callbacks
# Definir via variável de ambiente em produção: export APPYPAY_WEBHOOK_SECRET=<secret>
app.payment.appypay.webhook-secret=${APPYPAY_WEBHOOK_SECRET:}

# Timeout de requisição (ms)
app.payment.appypay.timeout-ms=20000

# Modo debug (logs detalhados)
app.payment.appypay.debug=false

# Modo mock (desenvolvimento local sem API real)
# DEFAULT: true (não chama API real sem credenciais)
app.payment.appypay.mock=true

# Métodos de pagamento (placeholder - sobrescrito no perfil dev)
app.payment.appypay.methods.gpo=
app.payment.appypay.methods.ref=

# ===============================================================================
# TELCOSMS - GATEWAY DE NOTIFICAÇÕES SMS
# ===============================================================================

# URL da API TelcoSMS
app.notification.telcosms.base-url=https://www.telcosms.co.ao

# Chave de API (placeholder - usar ENV ou perfil dev)
app.notification.telcosms.api-key=${TELCOSMS_API_KEY:}

# Timeout de requisição (ms)
app.notification.telcosms.timeout-ms=15000

# Modo debug (logs detalhados)
app.notification.telcosms.debug=false

# Modo mock (desenvolvimento local sem envio real de SMS)
# DEFAULT: true (não envia SMS real sem credenciais)
app.notification.telcosms.mock=true

# Código de país padrão (Angola)
app.notification.telcosms.default-country-code=+244

# Número máximo de tentativas em caso de falha
app.notification.telcosms.max-retries=3

# Configuracao Monetaria Global
system.currency=AOA
system.currency.symbol=Kz
system.currency.locale=pt_AO

# ===============================================================================
# OPERAÇÃO (TURNOS / CHECKLIST)
# ===============================================================================
# Default: não bloquear pedido público sem turno aberto (adoção progressiva em piloto).
consuma.operacao.require-open-turno-for-orders=false
# Default: POS/device deve operar com turno aberto.
consuma.operacao.require-open-turno-for-device-orders=true
# Default: POS/device deve iniciar pagamento apenas com turno aberto.
consuma.operacao.require-open-turno-for-device-payments=true

# ===============================================================================
# Prompt 32 — Polling ativo do gateway para pagamentos pendentes (rede de segurança)
# ===============================================================================
consuma.payment.polling.enabled=true
consuma.payment.polling.fixed-delay-ms=60000
consuma.payment.polling.batch-size=50
consuma.payment.polling.max-attempts=10
consuma.payment.polling.initial-delay-minutes=2
consuma.payment.polling.max-age-hours=24
consuma.payment.polling.backoff-multiplier=2
consuma.payment.polling.max-backoff-minutes=30

# ===============================================================================
# Prompt 33 — Visibilidade operacional de pagamentos pendentes (tenant)
# ===============================================================================
consuma.financeiro.pending-payments.default-lookback-hours=24
consuma.financeiro.pending-payments.max-page-size=100
consuma.financeiro.pending-payments.warning-after-minutes=10
consuma.financeiro.pending-payments.critical-after-minutes=30
consuma.financeiro.pending-payments.block-turno-close-on-critical=false
# Dispositivo é considerado "offline" no pré-fecho se heartbeat mais antigo que X minutos.
consuma.operacao.device-offline-minutes=10

# ===============================================================================
# DEVICE ORDERS (POS online)
# ===============================================================================
consuma.device.orders.max-items=100
consuma.device.orders.max-observacao-length=500
consuma.device.orders.default-lookback-hours=12

# ===============================================================================
# MINIO - ARMAZENAMENTO DE ARQUIVOS (LOCAL)
# ===============================================================================
app.storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.storage.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
app.storage.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
app.storage.minio.bucket-name=${MINIO_BUCKET:restaurante-images}
app.storage.minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000/restaurante-images}
