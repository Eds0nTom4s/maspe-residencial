# ===============================================================================
# PERFIL LEGADO: DEV com H2 (não recomendado para baseline real / piloto)
# ===============================================================================
spring.config.activate.on-profile=dev-h2

spring.datasource.url=jdbc:h2:mem:restaurante_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Em H2, Flyway PostgreSQL-native não é compatível
spring.flyway.enabled=false

# Hibernate cria schema localmente (apenas DEV rápido)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

