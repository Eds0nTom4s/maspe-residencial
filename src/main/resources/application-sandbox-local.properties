spring.config.activate.on-profile=sandbox-local

# Defaults locais: herda o profile `sandbox` via profile group e apenas ajusta
# host/portas/URLs para o compose local.
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres-local}:${DB_PORT:5432}/${DB_NAME:consuma_sandbox}
spring.datasource.username=${DB_USER:consuma}
spring.datasource.password=${DB_PASSWORD}

app.base-url=${APP_BASE_URL:http://localhost:8081/api}
app.client-url=${CLIENT_APP_URL:http://localhost:5173}
consuma.public-base-url=${CONSUMA_PUBLIC_BASE_URL:http://localhost:8081}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8081}

logging.level.com.restaurante=INFO
