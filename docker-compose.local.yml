services:
  postgres:
    image: postgres:16-alpine
    container_name: consuma-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: consuma_local
      POSTGRES_USER: consuma
      POSTGRES_PASSWORD: consuma
    ports:
      - "5432:5432"
    volumes:
      - consuma-postgres-local-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consuma -d consuma_local"]
      interval: 10s
      timeout: 5s
      retries: 10

  consuma-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: consuma-api:local
    container_name: consuma-api-local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/consuma_local
      SPRING_DATASOURCE_USERNAME: consuma
      SPRING_DATASOURCE_PASSWORD: consuma
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"

      # Secrets (locais, não-prod). Use valores fortes para evitar warnings e garantir fluxos.
      JWT_SECRET: "local-dev-jwt-secret-please-change-32chars-min-0000000000000000"
      DEVICE_TOKEN_HASH_SECRET: "local-dev-device-token-hash-secret-please-change-32chars-min"
      SYNC_CURSOR_HMAC_SECRET: "local-dev-sync-cursor-hmac-secret-please-change-32chars-min"
      APPYPAY_WEBHOOK_SECRET: "local-dev-appypay-webhook-secret-please-change-32chars-min"
      CONSUMA_SNAPSHOT_HMAC_SECRET_V1: "local-dev-snapshot-hmac-secret-v1-please-change-32chars-min"

      # Mocks default (local)
      APPYPAY_MOCK: "true"
      TELCOSMS_MOCK: "true"

      # CORS (ajuste conforme necessidade)
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
    ports:
      - "8080:8080"

volumes:
  consuma-postgres-local-data:
