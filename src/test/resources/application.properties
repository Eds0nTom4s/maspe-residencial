# Configurações para testes
spring.task.scheduling.enabled=false
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Desabilitar data.sql em testes - testes criam seus próprios dados
spring.sql.init.mode=never
logging.level.root=WARN
logging.level.com.restaurante=INFO

# Configuracao Monetaria Global
system.currency=AOA
system.currency.symbol=Kz
system.currency.locale=pt_AO

# Temporarily needed to bypass JwtTokenProvider exception during test context initialization
jwt.secret=5f4dcc3b5aa765d61d8327deb882cf995f4dcc3b5aa765d61d8327deb882cf99
jwt.expiration=86400000

# Storage (MinIO) - necessário para inicializar o contexto Spring em testes
# Valores dummy (não devem ser usados para operações reais em testes unitários).
app.storage.minio.endpoint=http://localhost:9000
app.storage.minio.access-key=minioadmin
app.storage.minio.secret-key=minioadmin
app.storage.minio.bucket-name=restaurante-images
app.storage.minio.public-url=http://localhost:9000/restaurante-images
