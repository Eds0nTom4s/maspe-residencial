# ===============================================================================
# PERFIL DE TESTE INTEGRAÇÃO (PostgreSQL via Testcontainers)
# ===============================================================================
spring.config.activate.on-profile=it-postgres

spring.main.web-application-type=none

# Datasource vem do Testcontainers (@DynamicPropertySource)

# Flyway é a fonte de verdade do schema nos testes de integração
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# Hibernate apenas valida
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.root=WARN
logging.level.com.restaurante=INFO

# Polling pode interferir em testes de integração; habilitar apenas em testes específicos.
consuma.payment.polling.enabled=false
# Prompt 37.4 — keyring HMAC apenas para testes (nunca usar em produção)
consuma.financeiro.snapshot-integridade.active-key-id=platform-snapshot-key-v1
consuma.financeiro.snapshot-integridade.keys.platform-snapshot-key-v1.status=ACTIVE
consuma.financeiro.snapshot-integridade.keys.platform-snapshot-key-v1.secret=TEST_SECRET_SNAPSHOT_HMAC_V1_32CHARS_MIN_123456

# Prompt 38/38.1 — AppyPay é opcional; em testes IT consideramos gateway "mockado" para não bloquear iniciação.
app.payment.appypay.mock=true
