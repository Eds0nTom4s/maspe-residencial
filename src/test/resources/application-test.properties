# ===============================================================================
# PERFIL DE TESTE (Prompt 0.1)
# ===============================================================================
spring.config.activate.on-profile=test

# Evitar levantar servidor web real em testes
spring.main.web-application-type=none

# Evitar jobs @Scheduled durante testes (evita threads não-daemon e ruído/erros após drop do schema)
spring.task.scheduling.enabled=false

# Datasource será fornecido via Testcontainers (@DynamicPropertySource)
# Mantemos defaults previsíveis (H2) para o contexto inicializar.
# Integração com PostgreSQL via Testcontainers deve rodar em profile/CI com Docker disponível.

# Datasource H2 (rápido e estável para testes unitários)
spring.datasource.url=jdbc:h2:mem:testdb_test_profile;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate cria o schema no banco de teste (transição até termos baseline real)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Unit tests com H2: Flyway desabilitado (baseline V1 é PostgreSQL-native).
# Baseline real é validado em PostgreSQL via Testcontainers no profile `it-postgres`.
spring.flyway.enabled=false

# Reduzir logs em testes
logging.level.root=WARN
logging.level.com.restaurante=INFO

# Polling pode interferir em testes unitários/rápidos; habilitar apenas em testes específicos.
consuma.payment.polling.enabled=false

# JWT secret dummy (necessário para beans que usam @Value)
jwt.secret=TEST_JWT_SECRET_256_BITS_MINIMUM_0123456789012345
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# Desabilitar init via data.sql em testes
spring.sql.init.mode=never

# Segredos mínimos para fluxos device em testes unitários (hash). Nunca usar em produção.
consuma.device.token-hash-secret=TEST_DEVICE_TOKEN_HASH_SECRET_32CHARS_MIN_123456
consuma.sync.cursor.hmac-secret=TEST_SYNC_CURSOR_HMAC_SECRET_32CHARS_MIN_123456
# Prompt 37.4 — keyring HMAC apenas para testes (nunca usar em produção)
consuma.financeiro.snapshot-integridade.active-key-id=platform-snapshot-key-v1
consuma.financeiro.snapshot-integridade.keys.platform-snapshot-key-v1.status=ACTIVE
consuma.financeiro.snapshot-integridade.keys.platform-snapshot-key-v1.secret=TEST_SECRET_SNAPSHOT_HMAC_V1_32CHARS_MIN_123456
